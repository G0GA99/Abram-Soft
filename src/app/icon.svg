<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E12" />
      <stop offset="100%" stop-color="#050507" />
    </linearGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24D09B" />
      <stop offset="100%" stop-color="#1BB080" />
    </linearGradient>
  </defs>
  <!-- Roundy Circle Background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#1BB080" stroke-width="3" stroke-opacity="0.5" />
  
  <!-- "A" Monogram -->
  <g transform="translate(0, 1)">
    <path d="M 28 72 L 50 26 L 72 72" stroke="url(#aGrad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 39 52 L 61 52" stroke="url(#aGrad)" stroke-width="9" stroke-linecap="round" />
    <circle cx="50" cy="42" r="3.6" fill="#ffffff" />
  </g>
